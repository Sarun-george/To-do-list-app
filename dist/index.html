    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        <title>Todo List</title>
    <script defer src="main.js"></script></head>
    <body>
            <header>
            <nav>
                <h1>Todo List</h1>
                <button id="todo-button">Add Task</button>
            </nav>
            </header>
            <div id="container">
            <div class="sidebar">
                <div class ="sidebar-header">
                    <h1>Projects</h1>
                    <button id="project-button">+</button>
                </div>
                <div class="sidebar-content">
                   
                </div>
            </div>
            <div id="main-content">
                <h1>Tasks</h1>
                 <div id="task-list"></div>
            </div>
        </div>
        <dialog id="project-dialog">
                    <form id="project-form">
                        <h1>Create Project</h1>
                        <div>
                            <label for="">Title :</label>
                            <input type="text" id="project-title" placeholder="Title">
                        </div>
                        <div>
                            <button type="submit">Create</button>
                            <button type="button" id="cancel-btn">Cancel</button>
                        </div>
                    </form>
                </dialog>

                <dialog id="todo-dialog">
                    <form id="todo-form">
                        <h1>Create Task</h1>
                        <div>
                            <label for="">Title :</label>
                            <input type="text" id="todo-title" placeholder="Title">
                        </div>
                        <div>
                            <label for="">Description :</label>
                            <input type="text" id="todo-description" placeholder="Description">
                        </div>
                       <div>
                            <label for="">Due Date :</label>
                        <input type="date" id="todo-due-date">
                       </div>
                        <div>
                            <label for="">Priority :</label>
                        <select id="todo-priority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                        </div>
                        <div>
                            <button type="submit">Create</button>
                            <button type="button" id="cancel-todo-btn">Cancel</button>
                        </div>
                        
                    </form>
                </dialog>
    </body>
    </html>
